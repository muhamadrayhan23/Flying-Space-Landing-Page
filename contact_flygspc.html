    <script>
        // Mendeteksi pembukaan offcanvas
        const offcanvasNavbar = document.getElementById('offcanvasNavbar');
        const navLinks = document.querySelectorAll('.nav-link');

        // Saat offcanvas dibuka, ubah warna teks menjadi hitam
        offcanvasNavbar.addEventListener('show.bs.offcanvas', () => {
            navLinks.forEach(link => {
                link.style.color = 'black'; // Set color to black immediately
            });
        });
    </script>

<style>
    .container {
        display: flex;
        align-items: stretch; /* Memastikan semua elemen memiliki tinggi yang sama */
        max-width: 1200px; /* Maksimal lebar kontainer */
        margin: 0 auto;
        margin-top: 80px; 
    }

    .form-container {
        flex: 1 1 50%; /* Memastikan lebar setengah dari kontainer */
        padding-right: 20px; /* Spasi antara form dan garis */
        position: relative; /* Untuk penempatan garis vertikal */
    }

    .social-container {
        flex: 1 1 50%; /* Memastikan lebar setengah dari kontainer */
        padding-left: 20px; /* Spasi antara garis dan social container */
        display: flex;
        flex-direction: column; /* Mengatur konten secara vertikal */
        justify-content: flex-start; /* Memastikan konten dimulai dari atas */
        align-items: flex-end;
    }

    .social-icons {
        display: flex; /* Mengatur ikon secara horizontal */
        gap: 10px; /* Spasi antar ikon */
        margin-top: 10px; /* Spasi atas untuk judul */
    }

    .vertical-line {
        width: 2px; /* Lebar garis vertikal */
        background-color: #fff; /* Warna garis vertikal */
        position: absolute;
        top: 0; /* Memastikan garis dimulai dari atas */
        right: -10px; /* Spasi antara garis dan form */
        bottom: 0; /* Memastikan garis sampai ke bawah */
    }

    /* Tambahan gaya untuk memastikan tampilan yang baik */
    h1, h2 {
        margin: 0;
    }

    .nav-link.active {
        text-decoration: underline;
    }
</style>

            <label for="message">Message <span style="color: red;">*</span></label>
            <textarea id="message" name="message" rows="10" required></textarea>
